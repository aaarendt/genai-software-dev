<section data-slide="10-demo-phase-1"
         aria-label="Slide 10: Demo Phase 1 — Ask for a Plan"
         class="slide">

  <div class="accent-bar"></div>
  <div class="content">
    <p class="eyebrow">Step 1 · Live demo</p>
    <h1>Asking for a Plan to Improve my Code</h1>

    <div class="flowchart" aria-label="Flowchart of planning workflow">
      <svg viewBox="0 0 900 380" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- ── Node 1: Set mode ── -->
        <rect x="20" y="120" width="180" height="64" rx="8" fill="#4b2e83"/>
        <text x="110" y="147" text-anchor="middle" font-family="'Encode Sans',sans-serif" font-weight="700" font-size="13" fill="white" text-transform="uppercase">SET MODE</text>
        <text x="110" y="165" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="12" fill="#e8e3d3">Ask / Plan — not Agent</text>

        <!-- arrow 1→2 -->
        <line x1="200" y1="152" x2="244" y2="152" stroke="#ffc700" stroke-width="2"/>
        <polygon points="244,147 254,152 244,157" fill="#ffc700"/>

        <!-- ── Node 2: Send prompt ── -->
        <rect x="254" y="120" width="180" height="64" rx="8" fill="#4b2e83"/>
        <text x="344" y="147" text-anchor="middle" font-family="'Encode Sans',sans-serif" font-weight="700" font-size="13" fill="white">SEND PROMPT</text>
        <text x="344" y="163" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="11" fill="#e8e3d3">Propose a refactor plan —</text>
        <text x="344" y="177" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="11" fill="#e8e3d3">no code yet</text>

        <!-- arrow 2→3 -->
        <line x1="434" y1="152" x2="474" y2="152" stroke="#ffc700" stroke-width="2"/>
        <polygon points="474,147 484,152 474,157" fill="#ffc700"/>

        <!-- ── Node 3: Review plan ── -->
        <rect x="484" y="120" width="180" height="64" rx="8" fill="#4b2e83"/>
        <text x="574" y="147" text-anchor="middle" font-family="'Encode Sans',sans-serif" font-weight="700" font-size="13" fill="white">REVIEW PLAN</text>
        <text x="574" y="163" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="11" fill="#e8e3d3">Check for scope creep</text>
        <text x="574" y="177" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="11" fill="#e8e3d3">and unwanted additions</text>

        <!-- arrow 3→diamond -->
        <line x1="574" y1="184" x2="574" y2="216" stroke="#ffc700" stroke-width="2"/>
        <polygon points="569,216 574,226 579,216" fill="#ffc700"/>

        <!-- ── Decision diamond ── -->
        <polygon points="574,226 634,263 574,300 514,263" fill="#ffc700"/>
        <text x="574" y="258" text-anchor="middle" font-family="'Encode Sans',sans-serif" font-weight="800" font-size="13" fill="#4b2e83">Satisfied</text>
        <text x="574" y="273" text-anchor="middle" font-family="'Encode Sans',sans-serif" font-weight="800" font-size="13" fill="#4b2e83">with plan?</text>

        <!-- YES arrow → Node 4 -->
        <line x1="634" y1="263" x2="700" y2="263" stroke="#4b2e83" stroke-width="2"/>
        <polygon points="700,258 710,263 700,268" fill="#4b2e83"/>
        <text x="663" y="256" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="11" font-weight="600" fill="#4b2e83">Yes</text>

        <!-- ── Node 4: Approve ── -->
        <rect x="710" y="231" width="170" height="64" rx="8" fill="#32006e"/>
        <text x="795" y="258" text-anchor="middle" font-family="'Encode Sans',sans-serif" font-weight="700" font-size="13" fill="white">APPROVE PLAN</text>
        <text x="795" y="275" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="11" fill="#e8e3d3">Proceed to Step 2</text>

        <!-- NO arrow down then left back to Node 3 -->
        <line x1="574" y1="300" x2="574" y2="340" stroke="#4b2e83" stroke-width="2"/>
        <line x1="574" y1="340" x2="484" y2="340" stroke="#4b2e83" stroke-width="2"/>
        <text x="524" y="358" text-anchor="middle" font-family="'Open Sans',sans-serif" font-size="13" font-weight="600" fill="#4b2e83">No — push back and edit the plan</text>
        <!-- arrow back up into Node 3 bottom -->
        <line x1="484" y1="340" x2="484" y2="184" stroke="#4b2e83" stroke-width="2"/>
        <polygon points="479,184 484,174 489,184" fill="#4b2e83"/>

      </svg>
    </div>
  </div>

  <style>
    section[data-slide="10-demo-phase-1"] {
      background: var(--uw-white);
      padding: var(--space-6) var(--space-10) var(--space-6) var(--space-12);
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    section[data-slide="10-demo-phase-1"] .accent-bar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 8px;
      background: var(--uw-spirit-gold);
    }

    section[data-slide="10-demo-phase-1"] .content {
      max-width: 1300px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    section[data-slide="10-demo-phase-1"] .eyebrow {
      font-family: var(--font-body);
      font-size: clamp(1rem, 1.1vw, 1.125rem);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--uw-gray-50);
      margin: 0;
    }

    section[data-slide="10-demo-phase-1"] h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 2.8vw, 3rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1.0;
      color: var(--uw-spirit-purple);
      margin: 0;
    }

    section[data-slide="10-demo-phase-1"] .flowchart {
      width: 100%;
    }

    section[data-slide="10-demo-phase-1"] .flowchart svg {
      width: 100%;
      height: auto;
    }
  </style>
</section>
